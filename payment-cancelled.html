<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement Annulé - CyberQuantic</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #F8FAFC; color: #1E293B; text-align: center; padding: 10vh 20px; margin: 0; }
    .card { background: white; max-width: 500px; margin: 0 auto; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); border: 1px solid #E2E8F0; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #EF4444; font-size: 24px; margin-top: 0; }
    p { font-size: 16px; line-height: 1.6; color: #475569; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 12px 24px; background: #6366F1; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #4F46E5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>Paiement annulé</h1>
    <p>Votre session de paiement a été annulée. Aucun débit n'a été effectué sur votre carte.</p>
    <a href="/" class="btn">Ressayer</a>
  </div>
</body>
</html>
