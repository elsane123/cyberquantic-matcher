<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Expert Directory - CyberQuantic</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f8f9ff; color: #111827; margin: 0; padding: 24px; }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { text-align: center; color: #6366F1; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(99,102,241,0.10); overflow: hidden; display: flex; flex-direction: column; }
        .card-header { display: flex; align-items: center; padding: 16px; gap: 12px; }
        .card-header img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #e5e7eb; }
        .card-header-info { display: flex; flex-direction: column; }
        .card-name { font-weight: 600; font-size: 16px; }
        .card-headline { font-size: 13px; color: #6b7280; }
        .card-body { padding: 0 16px 16px; flex-grow: 1; }
        .card-bio { font-size: 13px; color: #374151; line-height: 1.5; margin-bottom: 12px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px; background: #EEF2FF; color: #6366F1; }
        .card-footer { background: #f9fafb; padding: 12px 16px; border-top: 1px solid #e5e7eb; text-align: right; }
        .linkedin-btn { display: inline-block; font-size: 12px; font-weight: 600; color: #4B5563; text-decoration: none; padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; transition: all 0.2s; }
        .linkedin-btn:hover { background: #e5e7eb; border-color: #9ca3af; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Expert Directory</h1>
        <div id="experts-grid" class="grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('experts-grid');
            try {
                const response = await fetch('./data/experts.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const experts = await response.json();

                if (!experts || experts.length === 0) {
                    grid.innerHTML = '<p>No experts found.</p>';
                    return;
                }

                grid.innerHTML = experts.map(expert => `
                    <div class="card">
                        <div class="card-header">
                            <img src="${expert.profile_image_url || 'https://via.placeholder.com/50'}" alt="${expert.name}"  onerror="this.onerror=null;this.src='https://via.placeholder.com/50';"/>
                            <div class="card-header-info">
                                <div class="card-name">${expert.name}</div>
                                <div class="card-headline">${expert.headline}</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <p class="card-bio">${expert.bio}</p>
                            <div class="card-tags">
                                ${(expert.specializations || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                        <div class="card-footer">
                            <a href="${expert.linkedin_url}" target="_blank" rel="noopener noreferrer" class="linkedin-btn">LinkedIn Profile</a>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Failed to load experts:', error);
                grid.innerHTML = '<p>Failed to load expert data. Please try again later.</p>';
            }
        });
    </script>
</body>
</html>
